backend:
  name: github
  repo: ToddE/terndemo
  branch: main
  base_url: https://terndemo.hottoddie.org
  auth_endpoint: auth
  publish_mode: editorial_workflow

local_backend: true

media_folder: "public/images/uploads"
public_folder: "/images/uploads"



collections:
  - name: "pages"
    label: "Pages"
    files:
      - file: "src/content/pages/home.md"
        label: "Home Page"
        name: "home"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Hero Title", name: "heroTitle", widget: "string" }
          - { label: "Hero Subtitle", name: "heroSubtitle", widget: "text" }
          - { label: "Hero CTA Text", name: "heroCtaText", widget: "string" }
          - { label: "Hero Image", name: "heroImage", widget: "image", required: false }
          - label: "The TERN Advantage Features"
            name: "advantages"
            widget: "list"
            required: false
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "desc", widget: "text" }
              - { label: "Icon/Emoji", name: "icon", widget: "string" }
          - { label: "Body", name: "body", widget: "markdown" }
      - file: "src/content/pages/about.md"
        label: "About Page"
        name: "about"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Body", name: "body", widget: "markdown" }
      - file: "src/content/pages/solution.md"
        label: "Solution Page"
        name: "solution"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Body", name: "body", widget: "markdown" }

  - name: "news"
    label: "News & Resources"
    folder: "src/content/news"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Publish Date", name: "date", widget: "datetime" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Image", name: "image", widget: "image" }
      - { label: "Category", name: "category", widget: "select", options: ["News", "Whitepaper", "Research", "Podcast"] }
      - { label: "Audio/Podcast File (Optional)", name: "audioFile", widget: "file", required: false, hint: "Upload an MP3 file directly to the site." }
      - { label: "Body", name: "body", widget: "markdown" }
